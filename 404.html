<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages SPA fallback: redirect /puzzle/* to puzzle/index.html
    const path = window.location.pathname;
    if (path.startsWith('/puzzle/')) {
      // Stay on this page but show puzzle content
    } else {
      // Other 404s redirect to home
      window.location.href = '/';
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NumFusion Puzzle Challenge</title>
  <meta name="apple-itunes-app" content="app-id=6738043567">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .seed {
      font-family: monospace;
      background: rgba(255,255,255,0.1);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      font-size: 0.9rem;
      word-break: break-all;
    }
    p { color: #aaa; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #e94560;
      color: #fff;
      text-decoration: none;
      padding: 0.8rem 2rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const path = window.location.pathname;
      const match = path.match(/\/puzzle\/(PZ-[A-Z]-\d+-[a-f0-9]+)/i);
      if (match) {
        const seedEl = document.getElementById('seed');
        if (seedEl) seedEl.textContent = match[1];
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="icon">🧩</div>
    <h1>NumFusion Puzzle</h1>
    <div class="seed" id="seed">—</div>
    <p>在 NumFusion App 中開啟這個挑戰，看看你能拿到幾星！</p>
    <a class="btn" href="https://apps.apple.com/app/id6738043567">下載 NumFusion</a>
  </div>
</body>
</html>
